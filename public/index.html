<!DOCTYPE html>
<html lang="en">
  <!--
defining metadata and including resource
  -->
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <!--
    Provides a description of the web page, which can be used by search engines and social media.
    -->
    <meta
      name="description"
      content="Web site created using create-react-app"
    />
    <title>Policy API</title>
  </head>
  <body>
    <!--
    a message that will be displayed if JavaScript is disabled in the user's browser
    -->
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <!--
      When the React application is initialized, it will render its components inside this <div>. The id="root" is a convention used by React to identify the main container where the entire application will be injected
    -->
    <div id="root"></div>
  </body>
</html>
